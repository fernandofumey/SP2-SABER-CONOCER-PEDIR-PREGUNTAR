<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saber vs Conocer / Pedir vs Preguntar</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Extra CSS rule to physically block selection across browsers */
        .no-select {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="bg-orange-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- ICONS ---
        const AlertTriangle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
        const CheckCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const Play = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const RefreshCw = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>;
        const ChevronLeft = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"></path></svg>;

        // --- 50 QUESTION BANK (Saber/Conocer & Pedir/Preguntar) ---
        const QUESTIONS = [
            // Drag & Drop (15)
            { type: 'drag_drop', prompt: "I know how to swim.", correct: ["yo", "sé", "nadar"], acceptable: ["yo sé nadar", "sé nadar"], distractors: ["conozco", "sabes", "a"] },
            { type: 'drag_drop', prompt: "She knows my brother.", correct: ["ella", "conoce", "a", "mi", "hermano"], acceptable: ["ella conoce a mi hermano", "conoce a mi hermano"], distractors: ["sabe", "conocen", "de"] },
            { type: 'drag_drop', prompt: "We ask for water.", correct: ["nosotros", "pedimos", "agua"], acceptable: ["nosotros pedimos agua", "pedimos agua"], distractors: ["preguntamos", "piden", "por"] },
            { type: 'drag_drop', prompt: "He asks what time it is.", correct: ["él", "pregunta", "qué", "hora", "es"], acceptable: ["él pregunta qué hora es", "pregunta qué hora es"], distractors: ["pide", "pregunto", "a"] },
            { type: 'drag_drop', prompt: "They know the answer.", correct: ["ellos", "saben", "la", "respuesta"], acceptable: ["ellos saben la respuesta", "saben la respuesta"], distractors: ["conocen", "sabe", "a"] },
            { type: 'drag_drop', prompt: "Do you know where the restaurant is?", correct: ["tú", "sabes", "dónde", "está", "el", "restaurante"], acceptable: ["tú sabes dónde está el restaurante", "sabes tú dónde está el restaurante", "sabes dónde está el restaurante tú", "sabes dónde está el restaurante"], distractors: ["conoces", "pides"] },
            { type: 'drag_drop', prompt: "We know the new teacher.", correct: ["nosotros", "conocemos", "al", "maestro", "nuevo"], acceptable: ["nosotros conocemos al maestro nuevo", "nosotros conocemos al nuevo maestro", "conocemos al maestro nuevo", "conocemos al nuevo maestro"], distractors: ["sabemos", "a", "el"] },
            { type: 'drag_drop', prompt: "I order the chicken.", correct: ["yo", "pido", "el", "pollo"], acceptable: ["yo pido el pollo", "pido el pollo"], distractors: ["pregunto", "sabe"] },
            { type: 'drag_drop', prompt: "She asks a lot of questions.", correct: ["ella", "pregunta", "mucho"], acceptable: ["ella pregunta mucho", "pregunta mucho"], distractors: ["pide", "sabe", "por"] },
            { type: 'drag_drop', prompt: "I don't know the phone number.", correct: ["yo", "no", "sé", "el", "número"], acceptable: ["yo no sé el número", "no sé el número"], distractors: ["conozco", "sabes"] },
            { type: 'drag_drop', prompt: "They know Paris very well.", correct: ["ellos", "conocen", "parís", "muy", "bien"], acceptable: ["ellos conocen parís muy bien", "conocen parís muy bien"], distractors: ["saben", "conocer"] },
            { type: 'drag_drop', prompt: "You ask for a favor.", correct: ["tú", "pides", "un", "favor"], acceptable: ["tú pides un favor", "pides tú un favor", "pides un favor tú", "pides un favor"], distractors: ["preguntas", "por"] },
            { type: 'drag_drop', prompt: "We ask where the museum is.", correct: ["nosotros", "preguntamos", "dónde", "está", "el", "museo"], acceptable: ["nosotros preguntamos dónde está el museo", "preguntamos dónde está el museo"], distractors: ["pedimos", "sabemos"] },
            { type: 'drag_drop', prompt: "He knows how to speak Spanish.", correct: ["él", "sabe", "hablar", "español"], acceptable: ["él sabe hablar español", "sabe hablar español"], distractors: ["conoce", "habla"] },
            { type: 'drag_drop', prompt: "Do you know my friend Maria?", correct: ["conoces", "a", "mi", "amiga", "maría"], acceptable: ["conoces a mi amiga maría"], distractors: ["sabes", "de", "conoce"] },

            // True / False (10)
            { type: 'true_false', prompt: "Does 'Yo conozco Madrid' mean 'I am familiar with Madrid'?", correctAnswer: true },
            { type: 'true_false', prompt: "You should use 'preguntar' to ask a waiter for a glass of water.", correctAnswer: false },
            { type: 'true_false', prompt: "'Saber' is used to talk about knowing how to do a skill, like playing guitar.", correctAnswer: true },
            { type: 'true_false', prompt: "Does 'Ella pide ayuda' mean 'She asks a question'?", correctAnswer: false },
            { type: 'true_false', prompt: "You must use the personal 'a' after 'conocer' when talking about knowing a person.", correctAnswer: true },
            { type: 'true_false', prompt: "To ask for the bill at a restaurant, you should use a form of 'preguntar'.", correctAnswer: false },
            { type: 'true_false', prompt: "To express that you know a fact, like the capital of Spain, you use 'saber'.", correctAnswer: true },
            { type: 'true_false', prompt: "'Conocer' is used to talk about knowing how to cook.", correctAnswer: false },
            { type: 'true_false', prompt: "If you want to inquire about a price (ask how much it is), you should use 'preguntar'.", correctAnswer: true },
            { type: 'true_false', prompt: "'Pedir' means to ask for something you want to receive, like an object or favor.", correctAnswer: true },

            // Dropdown (15)
            { type: 'dropdown', prompt: "Yo ___ (know) a tu hermana.", options: ["sé", "conozco", "sabe", "conoce"], correctAnswer: "conozco" },
            { type: 'dropdown', prompt: "Ellos ___ (ask for) más pan.", options: ["preguntan", "piden", "pedimos", "pregunto"], correctAnswer: "piden" },
            { type: 'dropdown', prompt: "¿Tú ___ (know) dónde está el baño?", options: ["conoces", "sabes", "sé", "conoce"], correctAnswer: "sabes" },
            { type: 'dropdown', prompt: "El estudiante ___ (asks) una pregunta.", options: ["pide", "pregunta", "pido", "preguntan"], correctAnswer: "pregunta" },
            { type: 'dropdown', prompt: "Nosotros no ___ (know) a esa persona.", options: ["sabemos", "conocemos", "saben", "conocen"], correctAnswer: "conocemos" },
            { type: 'dropdown', prompt: "Yo no ___ (know) a tus padres.", options: ["conozco", "sé", "piden", "pregunto"], correctAnswer: "conozco" },
            { type: 'dropdown', prompt: "Él ___ (asks for) perdón.", options: ["pide", "pregunta", "sabe", "conoce"], correctAnswer: "pide" },
            { type: 'dropdown', prompt: "¿___ (Do you know) a qué hora empieza la película?", options: ["sabes", "conoces", "preguntas", "pides"], correctAnswer: "sabes" },
            { type: 'dropdown', prompt: "Nosotros ___ (ask) por la salud de la abuela.", options: ["preguntamos", "pedimos", "sabemos", "conocemos"], correctAnswer: "preguntamos" },
            { type: 'dropdown', prompt: "Ellos no ___ (know) hablar francés.", options: ["saben", "conocen", "piden", "preguntan"], correctAnswer: "saben" },
            { type: 'dropdown', prompt: "Tú ___ (know) este restaurante, ¿verdad?", options: ["conoces", "sabes", "pides", "preguntas"], correctAnswer: "conoces" },
            { type: 'dropdown', prompt: "La niña ___ (asks for) un juguete nuevo.", options: ["pide", "pregunta", "sabe", "conoce"], correctAnswer: "pide" },
            { type: 'dropdown', prompt: "Yo le ___ (ask) al profesor si puedo ir al baño.", options: ["pregunto", "pido", "sé", "conozco"], correctAnswer: "pregunto" },
            { type: 'dropdown', prompt: "Mi madre ___ (knows) que yo no estudié.", options: ["sabe", "conoce", "pide", "pregunta"], correctAnswer: "sabe" },
            { type: 'dropdown', prompt: "Ustedes ___ (know) al presidente.", options: ["conocen", "saben", "piden", "preguntan"], correctAnswer: "conocen" },

            // Matching & Double Matching (10)
            { type: 'double_dropdown_matching', prompt: "Match the English to the correct Spanish (SABER/CONOCER):", rows: [{left: "I know how to read", right1: "yo", right2: "sé"}, {left: "She is familiar with Paris", right1: "ella", right2: "conoce"}, {left: "They know the truth", right1: "ellos", right2: "saben"}, {left: "We know the doctor", right1: "nosotros", right2: "conocemos"}] },
            { type: 'double_dropdown_matching', prompt: "Match the English to the correct Spanish (PEDIR/PREGUNTAR):", rows: [{left: "I ask for a favor", right1: "yo", right2: "pido"}, {left: "You (informal) ask a question", right1: "tú", right2: "preguntas"}, {left: "He asks for money", right1: "él", right2: "pide"}, {left: "We ask what time it is", right1: "nosotros", right2: "preguntamos"}] },
            { type: 'matching', prompt: "Match the verb to its general usage rule:", pairs: [{left: "Saber", right: "To know facts, info, or how to do something"}, {left: "Conocer", right: "To be familiar with people, places, or things"}, {left: "Pedir", right: "To ask for an object, favor, or service"}, {left: "Preguntar", right: "To ask a question or request information"}] },
            { type: 'matching', prompt: "Match the Spanish phrase to its translation:", pairs: [{left: "yo pido la cuenta", right: "I ask for the bill"}, {left: "yo hago una pregunta", right: "I ask a question"}, {left: "yo sé la respuesta", right: "I know the answer"}, {left: "yo conozco al maestro", right: "I know the teacher"}] },
            { type: 'double_dropdown_matching', prompt: "Match the subject to the correct conjugation of PEDIR:", rows: [{left: "I ask for", right1: "yo", right2: "pido"}, {left: "She asks for", right1: "ella", right2: "pide"}, {left: "We ask for", right1: "nosotros", right2: "pedimos"}, {left: "They ask for", right1: "ellos", right2: "piden"}] },
            { type: 'matching', prompt: "Match the phrase to the correct translation:", pairs: [{left: "I ask for water", right: "yo pido agua"}, {left: "I ask what time it is", right: "yo pregunto qué hora es"}, {left: "I know where he lives", right: "yo sé dónde vive"}, {left: "I know his cousin", right: "yo conozco a su primo"}] },
            { type: 'double_dropdown_matching', prompt: "Match the subject to the correct conjugation of SABER (facts):", rows: [{left: "I know", right1: "yo", right2: "sé"}, {left: "You (informal) know", right1: "tú", right2: "sabes"}, {left: "She knows", right1: "ella", right2: "sabe"}, {left: "We know", right1: "nosotros", right2: "sabemos"}] },
            { type: 'double_dropdown_matching', prompt: "Match the subject to the correct conjugation of CONOCER (people/places):", rows: [{left: "I know", right1: "yo", right2: "conozco"}, {left: "You (informal) know", right1: "tú", right2: "conoces"}, {left: "He knows", right1: "él", right2: "conoce"}, {left: "They know", right1: "ellos", right2: "conocen"}] },
            { type: 'matching', prompt: "Match the Spanish infinitive to its specific meaning:", pairs: [{left: "pedir", right: "to request an object/favor"}, {left: "preguntar", right: "to request information"}, {left: "saber", right: "to know facts/information"}, {left: "conocer", right: "to be acquainted with"}] },
            { type: 'double_dropdown_matching', prompt: "Match the subject to the correct verb based on the context:", rows: [{left: "(I) ask for the menu", right1: "yo", right2: "pido"}, {left: "(He) asks a question", right1: "él", right2: "pregunta"}, {left: "(We) know the city", right1: "nosotros", right2: "conocemos"}, {left: "(They) know how to dance", right1: "ellos", right2: "saben"}] }
        ];

        const PERIODS = ["1st", "A2", "A4", "B3", "B4", "5th"];

        // Kept for internal shuffling of distractors, word banks, and matching choices
        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        function App() {
            const [studentInfo, setStudentInfo] = useState({ firstName: '', lastName: '', email: '', period: '' });
            const [loginError, setLoginError] = useState('');
            const [quizStarted, setQuizStarted] = useState(false);
            const [quizFinished, setQuizFinished] = useState(false);
            
            // This will hold our prepared questions (unshuffled order, but shuffled options)
            const [shuffledQuestions, setShuffledQuestions] = useState([]);
            
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [cheatCount, setCheatCount] = useState(0);
            const [showCheatAlert, setShowCheatAlert] = useState(false);
            
            const [userStates, setUserStates] = useState([]); 
            
            const [currentAnswer, setCurrentAnswer] = useState(null);
            const [draggedItem, setDraggedItem] = useState(null);
            const [dragSource, setDragSource] = useState(null); 
            
            const [questionResults, setQuestionResults] = useState([]);
            
            const [submitting, setSubmitting] = useState(false);
            const [submitStatus, setSubmitStatus] = useState('');

            const loadQuestion = useCallback(() => {
                if (shuffledQuestions.length === 0) return;
                
                const q = shuffledQuestions[currentQIndex];
                const savedState = userStates[currentQIndex];

                if (savedState !== null && savedState !== undefined) {
                    setCurrentAnswer(savedState);
                } else {
                    if (q.type === 'drag_drop') {
                        setCurrentAnswer({ available: q.initialAvailable, selected: [] });
                    } else if (q.type === 'true_false') {
                        setCurrentAnswer(null);
                    } else if (q.type === 'dropdown') {
                        setCurrentAnswer('');
                    } else if (q.type === 'matching' || q.type === 'double_dropdown_matching') {
                        setCurrentAnswer({});
                    }
                }
            }, [currentQIndex, userStates, shuffledQuestions]);

            useEffect(() => {
                if (quizStarted && !quizFinished) {
                    loadQuestion();
                }
            }, [quizStarted, currentQIndex, quizFinished, loadQuestion]);

            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.hidden && quizStarted && !quizFinished) {
                        setCheatCount(prev => prev + 1);
                        setShowCheatAlert(true);
                    }
                };
                
                const handleWindowBlur = () => {
                    if (quizStarted && !quizFinished) {
                        setCheatCount(prev => prev + 1);
                        setShowCheatAlert(true);
                    }
                };

                document.addEventListener("visibilitychange", handleVisibilityChange);
                window.addEventListener("blur", handleWindowBlur);

                return () => {
                    document.removeEventListener("visibilitychange", handleVisibilityChange);
                    window.removeEventListener("blur", handleWindowBlur);
                };
            }, [quizStarted, quizFinished]);

            const handleItemClick = (item, source) => {
                const currentQ = shuffledQuestions[currentQIndex];
                if (currentQ?.type !== 'drag_drop') return;
                
                if (source === 'available') {
                    setCurrentAnswer(prev => ({
                        available: prev?.available?.filter(w => w.id !== item.id) || [],
                        selected: [...(prev?.selected || []), item]
                    }));
                } else {
                    setCurrentAnswer(prev => ({
                        selected: prev?.selected?.filter(w => w.id !== item.id) || [],
                        available: [...(prev?.available || []), item]
                    }));
                }
            };

            const handleDragStart = (e, item, source) => {
                setDraggedItem(item);
                setDragSource(source);
                if(e.dataTransfer) {
                    e.dataTransfer.setData('text/plain', item.id);
                    e.dataTransfer.effectAllowed = 'move';
                }
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                if(e.dataTransfer) e.dataTransfer.dropEffect = 'move';
            };

            const handleDrop = (e, targetZone) => {
                e.preventDefault();
                if (!draggedItem || dragSource === targetZone) {
                    setDraggedItem(null);
                    setDragSource(null);
                    return;
                }
                const currentQ = shuffledQuestions[currentQIndex];
                if (currentQ?.type === 'drag_drop') {
                    handleItemClick(draggedItem, dragSource);
                }
                setDraggedItem(null);
                setDragSource(null);
            };

            const handleBack = useCallback(() => {
                if (currentQIndex > 0) {
                    const newStates = [...userStates];
                    newStates[currentQIndex] = currentAnswer;
                    setUserStates(newStates);
                    setCurrentQIndex(prev => prev - 1);
                }
            }, [currentQIndex, currentAnswer, userStates]);

            const handleNext = useCallback(() => {
                const newStates = [...userStates];
                newStates[currentQIndex] = currentAnswer;
                setUserStates(newStates);

                if (currentQIndex < shuffledQuestions.length - 1) {
                    setCurrentQIndex(prev => prev + 1);
                } else {
                    let finalScore = 0;
                    let finalResults = [];
                    let responsesByPrompt = {};
                    
                    newStates.forEach((state, idx) => {
                        const q = shuffledQuestions[idx];
                        let isRight = false;
                        
                        if (q.type === 'drag_drop') {
                            const ansWords = state ? (state.selected || []) : []; 
                            const userSentence = ansWords.map(w => w.word).join(' ').toLowerCase();
                            
                            // Check against the acceptable list first, fall back to exact match
                            if (q.acceptable) {
                                isRight = q.acceptable.includes(userSentence);
                            } else {
                                const correctSentence = q.correct.join(' ').toLowerCase();
                                isRight = userSentence === correctSentence;
                            }
                        } else if (q.type === 'true_false' || q.type === 'dropdown') {
                            isRight = state === q.correctAnswer;
                        } else if (q.type === 'matching') {
                            if (state && Object.keys(state).length === q.pairs.length) {
                                isRight = q.pairs.every(p => state[p.left] === p.right);
                            }
                        } else if (q.type === 'double_dropdown_matching') {
                            if (state && Object.keys(state).length === q.rows.length) {
                                isRight = q.rows.every(row => 
                                    state[row.left] && 
                                    state[row.left].part1 === row.right1 && 
                                    state[row.left].part2 === row.right2
                                );
                            }
                        }
                        
                        if (isRight) finalScore++;
                        finalResults.push(`${idx + 1}${isRight ? 'r' : 'w'}`);

                        let correctStr = "";
                        if (q.type === 'drag_drop') correctStr = q.correct.join(' ');
                        else if (q.type === 'true_false') correctStr = q.correctAnswer ? "True" : "False";
                        else if (q.type === 'dropdown') correctStr = q.correctAnswer;
                        else if (q.type === 'matching') correctStr = q.pairs.map(p => `${p.left} -> ${p.right}`).join(', ');
                        else if (q.type === 'double_dropdown_matching') correctStr = q.rows.map(r => `${r.left} -> ${r.right1} ${r.right2}`).join(', ');
                        
                        responsesByPrompt[q.prompt] = `${isRight ? 'right' : 'wrong'} - ${correctStr}`;
                    });

                    const percentageScore = Math.round((finalScore / shuffledQuestions.length) * 100);

                    setScore(percentageScore);
                    setQuestionResults(finalResults);
                    finishQuiz(finalResults, percentageScore, shuffledQuestions.length, responsesByPrompt);
                }
            }, [currentQIndex, currentAnswer, userStates, shuffledQuestions]);

            const finishQuiz = async (finalResults, percentageScore, totalQs, responsesByPrompt) => {
                setQuizFinished(true);
                setSubmitting(true);
                
                const emailKey = studentInfo.email.trim().toLowerCase();
                const pastTakers = JSON.parse(localStorage.getItem('hacerQuizTakers') || '[]');
                if (!pastTakers.includes(emailKey)) {
                    pastTakers.push(emailKey);
                    localStorage.setItem('hacerQuizTakers', JSON.stringify(pastTakers));
                }

                const baseHeaders = ["Quiz Title", "Date", "First Name", "Last Name", "Email", "Period", "Score", "Total Questions", "Cheating Alerts"];
                const baseRow = [
                    "SABER VS CONOCER & PEDIR VS PREGUNTAR (50 Qs)",
                    new Date().toLocaleDateString(),
                    studentInfo.firstName,
                    studentInfo.lastName,
                    studentInfo.email,
                    studentInfo.period,
                    percentageScore,
                    totalQs,
                    cheatCount
                ];

                const csvContent = baseHeaders.map(h => `"${h}"`).join(",") + "\n" + baseRow.map(item => `"${item}"`).join(",");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Spanish_Quiz_Results_${studentInfo.lastName}_${studentInfo.firstName}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                const payload = {
                    quizTitle: "SABER VS CONOCER & PEDIR VS PREGUNTAR",
                    timestamp: "SABER VS CONOCER & PEDIR VS PREGUNTAR - " + new Date().toLocaleString(),
                    firstName: studentInfo.firstName,
                    lastName: studentInfo.lastName,
                    email: studentInfo.email,
                    period: studentInfo.period,
                    score: percentageScore,
                    totalQuestions: totalQs,
                    cheatingAlertCount: cheatCount,
                    resultsDetail: finalResults.join(', ')
                };

                QUESTIONS.forEach((q, idx) => {
                    const qHeader = `Q${idx + 1}: ${q.prompt}`;
                    payload[qHeader] = responsesByPrompt[q.prompt] || "Not Answered";
                });

                try {
                    const GOOGLE_SHEETS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwEYa0Wv7mKtK7XRpDEtLwqxO9c8dfqwcPNCT4Y303nts1JxBNYw67dAXZurMJjYQHC/exec";
                    
                    if (GOOGLE_SHEETS_WEB_APP_URL !== "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE") {
                        const formData = new URLSearchParams();
                        formData.append("data", JSON.stringify(payload));

                        await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: formData
                        });
                        setSubmitStatus('Results successfully saved to Gradebook!');
                    } else {
                        setSubmitStatus('Done! (Note: Google Sheet URL not configured).');
                    }
                } catch (error) {
                    console.error("Submission error", error);
                    setSubmitStatus('Error submitting results. Please show this screen to your teacher.');
                } finally {
                    setSubmitting(false);
                }
            };

            const currentQ = shuffledQuestions[currentQIndex];

            const isAnswerIncomplete = () => {
                if (!currentQ) return true;
                if (currentAnswer === null || currentAnswer === undefined) return true;
                
                if (currentQ.type === 'drag_drop') {
                    return !currentAnswer.selected || currentAnswer.selected.length === 0;
                }
                if (currentQ.type === 'matching') {
                    return typeof currentAnswer !== 'object' || Object.keys(currentAnswer).length < currentQ.pairs.length;
                }
                if (currentQ.type === 'double_dropdown_matching') {
                    if (typeof currentAnswer !== 'object' || Object.keys(currentAnswer).length < currentQ.rows.length) return true;
                    return currentQ.rows.some(row => 
                        !currentAnswer[row.left] || 
                        !currentAnswer[row.left].part1 || 
                        !currentAnswer[row.left].part2
                    );
                }
                if (currentQ.type === 'dropdown') {
                    return currentAnswer === '';
                }
                return false;
            };

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Enter' && quizStarted && !quizFinished && !showCheatAlert) {
                        handleNext();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [handleNext, quizStarted, quizFinished, showCheatAlert]);

            const handleReset = () => {
                setStudentInfo({ firstName: '', lastName: '', email: '', period: '' });
                setLoginError('');
                setQuizStarted(false);
                setQuizFinished(false);
                setCurrentQIndex(0);
                setScore(0);
                setCheatCount(0);
                setShowCheatAlert(false);
                setUserStates([]);
                setShuffledQuestions([]);
                setQuestionResults([]);
                setSubmitStatus('');
            };

            const preventCopyEvents = (e) => {
                e.preventDefault();
            };

            if (!quizStarted) {
                const handleStartQuiz = (e) => {
                    e.preventDefault();
                    
                    const emailKey = studentInfo.email.trim().toLowerCase();
                    const pastTakers = JSON.parse(localStorage.getItem('hacerQuizTakers') || '[]');
                    
                    if (pastTakers.includes(emailKey)) {
                        setLoginError('This School Email / ID has already been used to complete the quiz.');
                        return;
                    }
                    
                    setLoginError('');
                    
                    // Maintain standard order of the main QUESTIONS array, but prepare the shuffled options for each
                    const preparedQuestions = [...QUESTIONS].map(q => {
                        if (q.type === 'drag_drop') {
                            const combinedWords = [...q.correct, ...q.distractors].map((word, index) => ({
                                id: `${word}-${index}-${Math.random()}`,
                                word: word
                            }));
                            return {
                                ...q,
                                initialAvailable: shuffleArray(combinedWords) // the word bank itself is still randomly shuffled
                            };
                        } else if (q.type === 'matching') {
                            const rights = q.pairs.map(p => p.right);
                            return { ...q, shuffledRights: shuffleArray(rights) };
                        } else if (q.type === 'double_dropdown_matching') {
                            const rights1 = [...new Set(q.rows.map(r => r.right1))];
                            const rights2 = [...new Set(q.rows.map(r => r.right2))];
                            return { 
                                ...q, 
                                shuffledRights1: shuffleArray(rights1),
                                shuffledRights2: shuffleArray(rights2)
                            };
                        }
                        return q;
                    });

                    // Still using the state name "setShuffledQuestions" to avoid major code rewrites, but the array is unshuffled.
                    setShuffledQuestions(preparedQuestions);
                    setUserStates(Array(preparedQuestions.length).fill(null));
                    setQuizStarted(true);
                };

                return (
                    <div className="min-h-screen bg-orange-50 flex items-center justify-center p-4 font-sans">
                        <div className="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full border border-orange-100">
                            <div className="flex justify-center mb-6">
                                <div className="bg-orange-600 p-3 rounded-full text-white">
                                    <RefreshCw className="w-8 h-8" />
                                </div>
                            </div>
                            <h1 className="text-3xl font-bold text-center text-orange-900 mb-2">Spanish II Assessment</h1>
                            <p className="text-center text-orange-600 mb-8 font-medium">Saber vs Conocer & Pedir vs Preguntar (50 Qs)</p>
                            
                            <form onSubmit={handleStartQuiz} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-semibold text-orange-800 mb-1">First Name</label>
                                    <input required type="text" className="w-full px-4 py-2 rounded-lg border border-orange-200 focus:ring-2 focus:ring-orange-500 focus:outline-none"
                                        value={studentInfo.firstName} onChange={e => setStudentInfo({...studentInfo, firstName: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-orange-800 mb-1">Last Name</label>
                                    <input required type="text" className="w-full px-4 py-2 rounded-lg border border-orange-200 focus:ring-2 focus:ring-orange-500 focus:outline-none"
                                        value={studentInfo.lastName} onChange={e => setStudentInfo({...studentInfo, lastName: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-orange-800 mb-1">School Email / ID</label>
                                    <input required type="text" className="w-full px-4 py-2 rounded-lg border border-orange-200 focus:ring-2 focus:ring-orange-500 focus:outline-none"
                                        value={studentInfo.email} onChange={e => setStudentInfo({...studentInfo, email: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-orange-800 mb-1">Class Period</label>
                                    <select required className="w-full px-4 py-2 rounded-lg border border-orange-200 focus:ring-2 focus:ring-orange-500 focus:outline-none bg-white"
                                        value={studentInfo.period} onChange={e => setStudentInfo({...studentInfo, period: e.target.value})}>
                                        <option value="" disabled>Select your period...</option>
                                        {PERIODS.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                </div>
                                
                                <div className="pt-4 border-t border-orange-100 mt-6">
                                    {loginError && (
                                        <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm font-semibold mb-4 text-center border border-red-200">
                                            {loginError}
                                        </div>
                                    )}
                                   <div className="flex items-start bg-orange-50 p-3 rounded-lg mb-4">
                                        <AlertTriangle className="w-5 h-5 text-orange-600 mr-2 flex-shrink-0 mt-0.5" />
                                        <p className="text-xs text-orange-800 leading-tight">
                                            <strong>Academic Integrity Notice:</strong> Leaving this tab or minimizing the window will trigger a cheating alert and notify your teacher. Copying text is disabled.
                                        </p>
                                   </div>
                                    <button type="submit" className="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 px-4 rounded-xl transition-colors flex items-center justify-center">
                                        <Play className="w-5 h-5 mr-2" /> Start Assessment
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            if (quizFinished) {
                return (
                    <div className="min-h-screen bg-orange-50 flex flex-col items-center py-12 px-4 font-sans">
                        <div className="bg-white rounded-2xl shadow-xl p-8 max-w-lg w-full text-center border border-orange-100">
                            <div className="mx-auto bg-orange-100 w-24 h-24 rounded-full flex items-center justify-center mb-6">
                                <CheckCircle className="w-12 h-12 text-orange-600" />
                            </div>
                            <h1 className="text-3xl font-bold text-orange-900 mb-2">Quiz Complete!</h1>
                            <p className="text-orange-600 mb-8">Excellent effort, {studentInfo.firstName}.</p>
                            
                            <div className="grid grid-cols-2 gap-4 mb-8">
                                <div className="bg-orange-50 p-4 rounded-xl border border-orange-100">
                                    <p className="text-sm text-orange-500 font-semibold mb-1">Final Score</p>
                                    <p className="text-4xl font-black text-orange-700">{score}<span className="text-2xl text-orange-400">%</span></p>
                                </div>
                                <div className={`p-4 rounded-xl border ${cheatCount > 0 ? 'bg-red-50 border-red-200' : 'bg-green-50 border-green-200'}`}>
                                    <p className={`text-sm font-semibold mb-1 ${cheatCount > 0 ? 'text-red-500' : 'text-green-600'}`}>Tab Violations</p>
                                    <p className={`text-4xl font-black ${cheatCount > 0 ? 'text-red-600' : 'text-green-700'}`}>{cheatCount}</p>
                                </div>
                            </div>

                            <div className="bg-gray-50 border border-gray-200 rounded-lg p-4 mb-6">
                               <p className="text-sm font-mono text-gray-700 break-words mb-2">
                                    Status: {submitting ? "Sending to gradebook..." : submitStatus}
                               </p>
                               <p className="text-sm text-orange-600 font-semibold border-t border-gray-200 pt-2 mt-2">
                                    ✓ A copy of your results (.csv) has been automatically downloaded for your records.
                               </p>
                            </div>

                            <button 
                                onClick={handleReset}
                                className="w-full bg-orange-100 hover:bg-orange-200 text-orange-800 font-bold py-3 px-4 rounded-xl transition-colors flex items-center justify-center border border-orange-300"
                            >
                                <RefreshCw className="w-5 h-5 mr-2" /> Return to Beginning
                            </button>
                        </div>
                    </div>
                );
            }

            if (!currentQ) {
                return <div className="min-h-screen bg-orange-50 flex items-center justify-center"><p>Loading questions...</p></div>;
            }

            const getQuestionHeader = (type) => {
                if (type === 'drag_drop') return "Translate to Spanish";
                if (type === 'true_false') return "True or False?";
                if (type === 'dropdown') return "Fill in the Blank";
                if (type === 'matching' || type === 'double_dropdown_matching') return "Match the Options";
                return "Answer the Question";
            };

            return (
                <div 
                    className="min-h-screen bg-orange-50 flex flex-col items-center py-8 px-4 font-sans no-select relative"
                    onContextMenu={preventCopyEvents}
                    onCopy={preventCopyEvents}
                    onCut={preventCopyEvents}
                    onPaste={preventCopyEvents}
                >
                    
                    {showCheatAlert && (
                        <div className="fixed inset-0 bg-red-900 bg-opacity-95 z-50 flex items-center justify-center p-6 flex-col">
                             <AlertTriangle className="w-24 h-24 text-red-400 mb-6 animate-pulse" />
                             <h2 className="text-4xl font-black text-white mb-4 text-center">Tab Switched!</h2>
                             <p className="text-red-200 text-xl text-center max-w-md mb-8">
                                 You left the assessment tab. This action has been recorded and your teacher will be notified.
                             </p>
                             <button 
                                 onClick={() => setShowCheatAlert(false)}
                                 className="bg-white text-red-900 font-bold py-3 px-8 rounded-full hover:bg-red-100 transition-colors"
                             >
                                 I Understand, Return to Quiz
                             </button>
                        </div>
                    )}

                    <div className="max-w-3xl w-full flex justify-between items-center mb-6">
                         <div className="text-orange-800 font-bold">
                                {studentInfo.firstName} {studentInfo.lastName} <span className="text-orange-500 font-normal">| Per {studentInfo.period}</span>
                         </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-xl p-6 md:p-10 max-w-3xl w-full border border-orange-100 flex-grow flex flex-col">
                        
                        <div className="mb-8">
                            <div className="flex justify-between text-sm font-semibold text-orange-500 mb-2">
                                 <span>Question {currentQIndex + 1} of {shuffledQuestions.length}</span>
                                 <span>{Math.round((currentQIndex / shuffledQuestions.length) * 100)}%</span>
                            </div>
                            <div className="w-full bg-orange-100 rounded-full h-2.5">
                                <div className="bg-orange-600 h-2.5 rounded-full transition-all duration-300" style={{ width: `${((currentQIndex) / shuffledQuestions.length) * 100}%` }}></div>
                            </div>
                        </div>

                        <div className="text-center mb-8">
                            <h2 className="text-sm font-bold text-orange-400 uppercase tracking-widest mb-2">{getQuestionHeader(currentQ.type)}</h2>
                            
                            {currentQ.type !== 'dropdown' && (
                                <p className="text-3xl font-black text-orange-900 pointer-events-none">"{currentQ.prompt}"</p>
                            )}
                            
                            {currentQ.type === 'drag_drop' && (
                                <p className="text-xs text-orange-400 mt-2 font-medium">Standard order required: Subject + Verb + Complement</p>
                            )}
                        </div>

                        {currentQ.type === 'drag_drop' && (
                            <div className="mb-6 flex-grow flex flex-col">
                                <p className="text-sm font-bold text-orange-600 mb-2">Your Answer:</p>
                                <div 
                                    className={`min-h-[80px] p-4 rounded-xl border-2 border-dashed flex flex-wrap gap-2 items-start content-start transition-colors
                                        ${dragSource === 'available' ? 'border-orange-400 bg-orange-50' : 'border-orange-200 bg-gray-50'}
                                    `}
                                    onDragOver={handleDragOver}
                                    onDrop={(e) => handleDrop(e, 'selected')}
                                >
                                    {(!currentAnswer?.selected || currentAnswer.selected.length === 0) && (
                                        <span className="text-gray-400 italic text-sm m-2 pointer-events-none">Tap or drop words here...</span>
                                    )}
                                    
                                    {currentAnswer?.selected?.map((item) => (
                                        <div 
                                            key={item.id}
                                            draggable
                                            onDragStart={(e) => handleDragStart(e, item, 'selected')}
                                            onClick={() => handleItemClick(item, 'selected')}
                                            className="px-4 py-2 rounded-lg font-bold shadow-sm transition-transform cursor-pointer bg-orange-600 text-white hover:bg-orange-700 hover:-translate-y-0.5"
                                        >
                                            {item.word}
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-8 mb-8">
                                    <p className="text-sm font-bold text-orange-600 mb-2">Word Bank (Includes Extras):</p>
                                    <div 
                                        className={`min-h-[100px] p-4 rounded-xl border border-orange-100 bg-white flex flex-wrap gap-3 items-start content-start shadow-inner transition-colors
                                            ${dragSource === 'selected' ? 'bg-orange-50 border-orange-300 border-dashed border-2' : ''}
                                        `}
                                        onDragOver={handleDragOver}
                                        onDrop={(e) => handleDrop(e, 'available')}
                                    >
                                        {currentAnswer?.available?.map((item) => (
                                            <div 
                                                key={item.id}
                                                draggable
                                                onDragStart={(e) => handleDragStart(e, item, 'available')}
                                                onClick={() => handleItemClick(item, 'available')}
                                                className="px-4 py-2 bg-white border-2 border-orange-200 text-orange-700 rounded-lg font-bold shadow-sm hover:border-orange-400 hover:text-orange-900 cursor-pointer transition-all hover:-translate-y-0.5 active:translate-y-0"
                                            >
                                                {item.word}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentQ.type === 'true_false' && (
                            <div className="flex-grow flex flex-col justify-center items-center mb-8">
                                <div className="flex justify-center gap-6 w-full max-w-sm">
                                    <button
                                        className={`flex-1 py-5 rounded-xl font-bold text-2xl border-2 transition-all ${currentAnswer === true ? 'bg-orange-600 text-white border-orange-700 shadow-md scale-105' : 'bg-white text-orange-600 border-orange-200 hover:bg-orange-50'}`}
                                        onClick={() => setCurrentAnswer(true)}
                                    >
                                        True
                                    </button>
                                    <button
                                        className={`flex-1 py-5 rounded-xl font-bold text-2xl border-2 transition-all ${currentAnswer === false ? 'bg-orange-600 text-white border-orange-700 shadow-md scale-105' : 'bg-white text-orange-600 border-orange-200 hover:bg-orange-50'}`}
                                        onClick={() => setCurrentAnswer(false)}
                                    >
                                        False
                                    </button>
                                </div>
                            </div>
                        )}

                        {currentQ.type === 'dropdown' && (
                            <div className="flex-grow flex flex-col items-center justify-center mb-8 text-center">
                                <div className="text-2xl md:text-3xl font-bold text-orange-900 flex flex-wrap justify-center items-center gap-2 pointer-events-auto">
                                    <span>{currentQ.prompt.split("___")[0]}</span>
                                    <select
                                        className="mx-2 p-2 text-xl md:text-2xl font-bold text-orange-700 bg-orange-50 border-b-4 border-orange-400 focus:outline-none focus:border-orange-600 rounded-t-md cursor-pointer transition-colors"
                                        value={currentAnswer || ''}
                                        onChange={(e) => setCurrentAnswer(e.target.value)}
                                    >
                                        <option value="" disabled>???</option>
                                        {currentQ.options.map((opt, idx) => (
                                            <option key={idx} value={opt}>{opt}</option>
                                        ))}
                                    </select>
                                    <span>{currentQ.prompt.split("___")[1]}</span>
                                </div>
                            </div>
                        )}

                        {currentQ.type === 'matching' && (
                            <div className="flex-grow flex flex-col justify-center mb-8 w-full max-w-2xl mx-auto space-y-4">
                                {currentQ.pairs.map((pair, idx) => (
                                    <div key={idx} className="flex justify-between items-center bg-orange-50 p-4 rounded-xl border border-orange-100 hover:border-orange-300 transition-colors pointer-events-auto">
                                        <span className="font-bold text-orange-900 w-1/2 pr-4 text-base md:text-lg">{pair.left}</span>
                                        <select
                                            className="w-1/2 p-3 rounded-lg border border-orange-300 bg-white focus:outline-none focus:ring-2 focus:ring-orange-500 font-semibold text-orange-800 cursor-pointer shadow-sm"
                                            value={(currentAnswer && currentAnswer[pair.left]) || ''}
                                            onChange={(e) => {
                                                setCurrentAnswer(prev => ({ ...prev, [pair.left]: e.target.value }));
                                            }}
                                        >
                                            <option value="" disabled>Select match...</option>
                                            {currentQ.shuffledRights.map((rightOption, optIdx) => (
                                                <option key={optIdx} value={rightOption}>{rightOption}</option>
                                            ))}
                                        </select>
                                    </div>
                                ))}
                            </div>
                        )}

                        {currentQ.type === 'double_dropdown_matching' && (
                            <div className="flex-grow flex flex-col justify-center mb-8 w-full max-w-3xl mx-auto space-y-4">
                                {currentQ.rows.map((row, idx) => (
                                    <div key={idx} className="flex flex-col md:flex-row justify-between items-center bg-orange-50 p-4 rounded-xl border border-orange-100 hover:border-orange-300 transition-colors pointer-events-auto gap-3">
                                        <span className="font-bold text-orange-900 w-full md:w-2/5 text-center md:text-left text-base md:text-lg">{row.left}</span>
                                        <div className="flex w-full md:w-3/5 gap-2">
                                            <select
                                                className="w-1/2 p-3 rounded-lg border border-orange-300 bg-white focus:outline-none focus:ring-2 focus:ring-orange-500 font-semibold text-orange-800 cursor-pointer shadow-sm"
                                                value={(currentAnswer && currentAnswer[row.left] && currentAnswer[row.left].part1) || ''}
                                                onChange={(e) => {
                                                    setCurrentAnswer(prev => ({ 
                                                        ...prev, 
                                                        [row.left]: { ...(prev[row.left] || {}), part1: e.target.value } 
                                                    }));
                                                }}
                                            >
                                                <option value="" disabled>Subject...</option>
                                                {currentQ.shuffledRights1.map((opt, optIdx) => (
                                                    <option key={optIdx} value={opt}>{opt}</option>
                                                ))}
                                            </select>
                                            <select
                                                className="w-1/2 p-3 rounded-lg border border-orange-300 bg-white focus:outline-none focus:ring-2 focus:ring-orange-500 font-semibold text-orange-800 cursor-pointer shadow-sm"
                                                value={(currentAnswer && currentAnswer[row.left] && currentAnswer[row.left].part2) || ''}
                                                onChange={(e) => {
                                                    setCurrentAnswer(prev => ({ 
                                                        ...prev, 
                                                        [row.left]: { ...(prev[row.left] || {}), part2: e.target.value } 
                                                    }));
                                                }}
                                            >
                                                <option value="" disabled>Verb...</option>
                                                {currentQ.shuffledRights2.map((opt, optIdx) => (
                                                    <option key={optIdx} value={opt}>{opt}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        <div className="mt-auto pt-4 flex justify-between items-center border-t border-orange-100">
                            <button 
                                onClick={handleBack}
                                disabled={currentQIndex === 0}
                                className={`flex items-center px-4 py-2 rounded-lg font-bold transition-colors ${currentQIndex === 0 ? 'text-orange-300 cursor-not-allowed' : 'text-orange-600 hover:bg-orange-100'}`}
                            >
                                <ChevronLeft className="w-5 h-5 mr-1" /> Back
                            </button>
                            
                            <button 
                                onClick={handleNext}
                                className="px-8 py-3 rounded-xl font-bold text-white transition-all shadow-md bg-orange-600 hover:bg-orange-700 hover:-translate-y-0.5"
                            >
                                {currentQIndex === shuffledQuestions.length - 1 ? 'Submit Assessment' : 'Next Question'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
